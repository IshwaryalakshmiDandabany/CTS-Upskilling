<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Registration Form</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 1.25rem; line-height: 1.5; }
    form { max-width: 620px; background: #ffffff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 1rem; }
    label { display: block; font-weight: 700; margin-top: 0.75rem; }
    input, select, textarea { width: 100%; padding: 0.6rem; margin-top: 0.35rem; border: 1px solid #d1d5db; border-radius: 10px; font-size: 1rem; }
    input:focus, select:focus, textarea:focus { outline: 2px solid #0b57d0; border-color: #0b57d0; }
    button { margin-top: 1rem; padding: 0.75rem 1rem; border: 0; border-radius: 10px; background: #0b57d0; color: #fff; font-weight: 800; cursor: pointer; }
    button:hover { background: #094aa8; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    output { display: block; margin-top: 1rem; padding: 0.75rem; background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 10px; }
  </style>
</head>
<body>
  <h1>Register for an Event</h1>

  <form id="registrationForm" method="post">
    <div class="row">
      <div>
        <label for="name">Name</label>
        <input id="name" name="name" type="text" placeholder="Your full name" required autofocus />
      </div>
      <div>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="name@example.com" required />
      </div>
    </div>

    <div class="row">
      <div>
        <label for="date">Date</label>
        <input id="date" name="date" type="date" required />
      </div>
      <div>
        <label for="eventType">Event Type</label>
        <select id="eventType" name="eventType" required>
          <option value="">Select...</option>
          <option value="workshop">Workshop</option>
          <option value="community">Community Gathering</option>
          <option value="outdoor">Outdoor Activity</option>
          <option value="seminar">Seminar</option>
        </select>
      </div>
    </div>

    <label for="message">Message</label>
    <textarea id="message" name="message" rows="5" placeholder="Any accessibility needs or questions?" required></textarea>

    <button type="submit">Submit Registration</button>

    <output id="confirmation" for="registrationForm" aria-live="polite"></output>
  </form>

  <script>
    const form = document.getElementById('registrationForm');
    const confirmation = document.getElementById('confirmation');

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const eventType = document.getElementById('eventType').value;
      const date = document.getElementById('date').value;

      const eventLabel = ({
        workshop: 'Workshop',
        community: 'Community Gathering',
        outdoor: 'Outdoor Activity',
        seminar: 'Seminar'
      })[eventType] || 'Event';

      confirmation.textContent = `Thanks, ${name}! Your registration for ${eventLabel} on ${date} has been received.`;
      confirmation.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
  </script>
</body>
</html>
