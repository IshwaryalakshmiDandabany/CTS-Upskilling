<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML Base Template</title>
  <!-- Internal CSS kept minimal for this exercise -->
  <style>
    body { font-family: Arial, Helvetica, sans-serif; line-height: 1.5; margin: 1.25rem; }
    .note { background: #f6f8fa; border-left: 4px solid #2f6fed; padding: 0.75rem 1rem; }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav aria-label="Primary">
    <a href="#main">Skip to main</a>
  </nav>

  <!-- Main -->
  <main id="main">
    <h1>Local Community Event Portal</h1>
    <p class="note">
      This page demonstrates the HTML5 base structure used by the portal.
      Open DevTools in Chrome and inspect the semantic elements.
    </p>

    <section aria-label="Example content">
      <h2>Document Structure</h2>
      <ul>
        <li><code><nav></code> for navigation</li>
        <li><code><main></code> for primary content</li>
        <li><code><footer></code> for footer information</li>
      </ul>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <small>© Local City Council</small>
  </footer>
</body>
</html>
