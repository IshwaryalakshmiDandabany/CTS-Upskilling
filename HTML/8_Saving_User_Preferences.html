<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saving User Preferences</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 1.25rem; line-height: 1.5; }
    select, button { font-size: 1rem; padding: 0.6rem; border-radius: 10px; }
    select { border: 1px solid #d1d5db; width: 100%; max-width: 400px; }
    button { border: 0; cursor: pointer; font-weight: 900; margin-top: 0.75rem; }
    .primary { background: #0b57d0; color: #fff; }
    .danger { background: #ef4444; color: #fff; }
    .box { max-width: 560px; border: 1px solid #e5e7eb; border-radius: 12px; padding: 1rem; }
    .hint { color: #6b7280; font-size: 0.95rem; }
  </style>
</head>
<body>
  <h1>User Preferences</h1>
  <div class="box">
    <label for="prefEvent" style="font-weight:800;">Preferred Event Type</label>
    <select id="prefEvent">
      <option value="">Select your preference...</option>
      <option value="workshop">Workshop</option>
      <option value="community">Community Gathering</option>
      <option value="outdoor">Outdoor Activity</option>
      <option value="seminar">Seminar</option>
    </select>

    <button class="primary" type="button" onclick="savePreference()">Save to localStorage</button>
    <button class="danger" type="button" onclick="clearPreferences()">Clear Preferences</button>

    <p class="hint">
      On reload, the selected preference is restored from <code>localStorage</code>.
      <code>sessionStorage</code> is also cleared by the Clear button.
    </p>
  </div>

  <script>
    const storageKey = 'preferredEventType';
    const prefSelect = document.getElementById('prefEvent');

    // Save to localStorage and sessionStorage (demo: both)
    function savePreference() {
      const value = prefSelect.value;
      if (!value) {
        alert('Select an event type first.');
        return;
      }

      localStorage.setItem(storageKey, value);
      sessionStorage.setItem(storageKey, value);
      alert('Preferences saved. Reload to see restoration from localStorage.');
    }

    function loadPreference() {
      const saved = localStorage.getItem(storageKey);
      if (saved) prefSelect.value = saved;
    }

    function clearPreferences() {
      localStorage.removeItem(storageKey);
      sessionStorage.removeItem(storageKey);
      prefSelect.value = '';
      alert('Local and session preferences cleared.');
    }

    // Restore on reload
    loadPreference();
  </script>
</body>
</html>
