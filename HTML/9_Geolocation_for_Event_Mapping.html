<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geolocation for Event Mapping</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 1.25rem; line-height: 1.5; }
    button { background: #0b57d0; color: #fff; border: 0; border-radius: 10px; padding: 0.75rem 1rem; font-weight: 900; cursor: pointer; }
    button:hover { background: #094aa8; }
    .box { max-width: 720px; border: 1px solid #e5e7eb; border-radius: 12px; padding: 1rem; }
    .status { margin-top: 1rem; padding: 0.75rem; background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 10px; }
    code { background: #f3f4f6; padding: 0.1rem 0.35rem; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>Find Nearby Events</h1>

  <div class="box">
    <button type="button" onclick="findNearbyEvents()">Find Nearby Events</button>

    <div id="status" class="status" aria-live="polite">
      Click the button to request your location.
    </div>

    <p>
      Coordinates will appear here. (In a real portal, these coordinates would be used to query events within a radius.)
    </p>
  </div>

  <script>
    const statusEl = document.getElementById('status');

    function findNearbyEvents() {
      if (!navigator.geolocation) {
        statusEl.textContent = 'Geolocation is not supported by your browser.';
        return;
      }

      statusEl.textContent = 'Requesting location...';

      navigator.geolocation.getCurrentPosition(
        (position) => {
          const { latitude, longitude, accuracy } = position.coords;
          statusEl.innerHTML = `Location found!<br>Latitude: <code>${latitude}</code><br>Longitude: <code>${longitude}</code><br>Accuracy: <code>${accuracy} meters</code>`;
        },
        (error) => {
          // Permission denied / unavailable / timeout handling
          switch (error.code) {
            case error.PERMISSION_DENIED:
              statusEl.textContent = 'Permission denied. Please allow location access and try again.';
              break;
            case error.POSITION_UNAVAILABLE:
              statusEl.textContent = 'Position unavailable. Please try again later.';
              break;
            case error.TIMEOUT:
              statusEl.textContent = 'Request timed out. Please try again.';
              break;
            default:
              statusEl.textContent = `Geolocation error: ${error.message}`;
          }
        },
        {
          enableHighAccuracy: true,
          timeout: 8000,
          maximumAge: 0
        }
      );
    }
  </script>
</body>
</html>
