<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Invite</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 1.25rem; line-height: 1.5; }
    video { width: 100%; max-width: 720px; border-radius: 12px; border: 4px solid #0b57d0; display: block; }
    .msg { margin-top: 0.75rem; padding: 0.75rem; background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 10px; }
  </style>
</head>
<body>
  <h1>Event Promo Video</h1>

  <video id="promoVideo" controls preload="metadata" width="640" height="360" 
    oncanplay="document.getElementById('videoStatus').textContent = 'Video ready to play';">
    <!-- Public sample video. Replace with your own local file if needed. -->
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4" />
    Sorry, your browser doesn’t support embedded video.
  </video>

  <div id="videoStatus" class="msg">Click play when ready. Loading status will appear once it can play.</div>

  <script>
    window.onbeforeunload = function () {
      return 'Are you sure you want to leave? If you are filling a form, your work may be lost.';
    };
  </script>
</body>
</html>
