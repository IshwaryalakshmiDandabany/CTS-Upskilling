<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Feedback with Events Handling</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 1.25rem; line-height: 1.5; }
    .card { max-width: 720px; border: 1px solid #e5e7eb; border-radius: 12px; padding: 1rem; }
    input, select, textarea { width: 100%; padding: 0.6rem; margin-top: 0.35rem; border: 1px solid #d1d5db; border-radius: 10px; font-size: 1rem; }
    input:focus, select:focus, textarea:focus { outline: 2px solid #0b57d0; border-color: #0b57d0; }
    label { display: block; font-weight: 800; margin-top: 0.75rem; }
    button { padding: 0.75rem 1rem; border: 0; border-radius: 10px; background: #0b57d0; color: #fff; font-weight: 900; cursor: pointer; margin-top: 1rem; }
    button:hover { background: #094aa8; }
    img { margin-top: 0.75rem; max-width: 320px; border: 4px solid #111827; border-radius: 12px; cursor: zoom-in; display: block; }
    .hint { color: #6b7280; font-size: 0.95rem; }
  </style>
</head>
<body>
  <h1>Event Feedback</h1>

  <div class="card">
    <form id="feedbackForm">
      <label for="phone">Phone Number (blur validation)</label>
      <input id="phone" name="phone" type="text" placeholder="e.g., 9876543210" onblur="validatePhone()" required />
      <div class="hint" id="phoneHint">Enter 10 digits (demo rule).</div>

      <label for="eventFee">Choose Event</label>
      <select id="eventFee" name="eventFee" onchange="displayFee()" required>
        <option value="">Select...</option>
        <option value="10">Community Workshop - $10</option>
        <option value="25">Neighborhood Seminar - $25</option>
        <option value="50">Outdoor Day - $50</option>
      </select>

      <p class="hint">Selected Fee: <strong id="feeOutput">—</strong></p>

      <label for="feedback">Your Feedback (key events count)</label>
      <textarea id="feedback" name="feedback" rows="6" placeholder="Type feedback here..." onkeyup="countChars()" onkeydown="countChars()"></textarea>
      <p class="hint">Characters: <strong id="charCount">0</strong></p>

      <button type="button" id="submitBtn" onclick="showConfirmation()">Submit Feedback (click)</button>

      <p class="hint">Double-click the image to enlarge:</p>
      <img id="promoImg" src="https://picsum.photos/seed/community-event/600/400" alt="Community event promotional" title="Double-click to enlarge" ondblclick="enlargeImage()" />
    </form>
  </div>

  <script>
    const charCountEl = document.getElementById('charCount');
    const feedbackEl = document.getElementById('feedback');
    const feeOutputEl = document.getElementById('feeOutput');
    const phoneEl = document.getElementById('phone');
    const phoneHintEl = document.getElementById('phoneHint');

    function validatePhone() {
      const value = (phoneEl.value || '').replace(/\s+/g, '');
      const isValid = /^\d{10}$/.test(value);

      if (!isValid) {
        phoneEl.style.borderColor = '#ef4444';
        phoneHintEl.textContent = 'Invalid phone. Please enter exactly 10 digits (demo).';
        phoneHintEl.style.color = '#dc2626';
      } else {
        phoneEl.style.borderColor = '#10b981';
        phoneHintEl.textContent = 'Looks good.';
        phoneHintEl.style.color = '#047857';
      }
    }

    function displayFee() {
      const fee = document.getElementById('eventFee').value;
      if (!fee) {
        feeOutputEl.textContent = '—';
        return;
      }
      feeOutputEl.textContent = `$${fee}`;
    }

    function showConfirmation() {
      const feedback = (feedbackEl.value || '').trim();
      const phone = (phoneEl.value || '').trim();
      const fee = document.getElementById('eventFee').selectedOptions[0]?.textContent || 'selected event';

      if (!feedback) {
        alert('Please type some feedback first.');
        feedbackEl.focus();
        return;
      }

      alert(`Thanks! Your feedback for ${fee} was submitted.\nPhone entered: ${phone || '(none)'}`);
    }

    let enlarged = false;
    function enlargeImage() {
      const img = document.getElementById('promoImg');
      enlarged = !enlarged;

      if (enlarged) {
        img.style.maxWidth = '90vw';
        img.style.borderColor = '#0b57d0';
        img.scrollIntoView({ behavior: 'smooth', block: 'center' });
      } else {
        img.style.maxWidth = '320px';
        img.style.borderColor = '#111827';
      }
    }

    function countChars() {
      const count = (feedbackEl.value || '').length;
      charCountEl.textContent = String(count);
    }

    // Initialize counts
    countChars();
  </script>
</body>
</html>
