<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bootstrap 5 - Exercise 10.2 Tabs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <h1 class="h3 mb-4">Exercise 10.2: Tabbed navigation with <code>nav-tabs</code> and <code>nav-pills</code></h1>

    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <h2 class="h5">nav-tabs</h2>

        <ul class="nav nav-tabs mt-3" id="tabsTab" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="tab-home" data-bs-toggle="tab" data-bs-target="#pane-home" type="button" role="tab" aria-controls="pane-home" aria-selected="true">Home</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="tab-profile" data-bs-toggle="tab" data-bs-target="#pane-profile" type="button" role="tab" aria-controls="pane-profile" aria-selected="false">Profile</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="tab-contact" data-bs-toggle="tab" data-bs-target="#pane-contact" type="button" role="tab" aria-controls="pane-contact" aria-selected="false">Contact</button>
          </li>
        </ul>

        <div class="tab-content p-3 border border-top-0" id="tabsTabContent">
          <div class="tab-pane fade show active" id="pane-home" role="tabpanel" aria-labelledby="tab-home" tabindex="0">
            Content for Home tab.
          </div>
          <div class="tab-pane fade" id="pane-profile" role="tabpanel" aria-labelledby="tab-profile" tabindex="0">
            Content for Profile tab.
          </div>
          <div class="tab-pane fade" id="pane-contact" role="tabpanel" aria-labelledby="tab-contact" tabindex="0">
            Content for Contact tab.
          </div>
        </div>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="h5">nav-pills</h2>

        <ul class="nav nav-pills mt-3" id="pillsTab" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="pills-a" data-bs-toggle="pill" data-bs-target="#pill-a" type="button" role="tab" aria-controls="pill-a" aria-selected="true">Tab A</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="pills-b" data-bs-toggle="pill" data-bs-target="#pill-b" type="button" role="tab" aria-controls="pill-b" aria-selected="false">Tab B</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="pills-c" data-bs-toggle="pill" data-bs-target="#pill-c" type="button" role="tab" aria-controls="pill-c" aria-selected="false">Tab C</button>
          </li>
        </ul>

        <div class="tab-content p-3 border border-top-0" id="pillsTabContent">
          <div class="tab-pane fade show active" id="pill-a" role="tabpanel" aria-labelledby="pills-a" tabindex="0">
            Content for pill A.
          </div>
          <div class="tab-pane fade" id="pill-b" role="tabpanel" aria-labelledby="pills-b" tabindex="0">
            Content for pill B.
          </div>
          <div class="tab-pane fade" id="pill-c" role="tabpanel" aria-labelledby="pills-c" tabindex="0">
            Content for pill C.
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
