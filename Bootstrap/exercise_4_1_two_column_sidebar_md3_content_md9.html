<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bootstrap 5 - Exercise 4.1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <h1 class="h3 mb-3">Exercise 4.1: Two-column layout with sidebar (col-md-3) and content (col-md-9)</h1>

    <div class="row g-3">
      <aside class="col-12 col-md-3">
        <div class="p-4 bg-white border rounded shadow-sm">
          <h2 class="h5">Sidebar</h2>
          <ul class="nav flex-column mt-3">
            <li class="nav-item"><a class="nav-link active" href="#">Menu Item 1</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Menu Item 2</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Menu Item 3</a></li>
          </ul>
        </div>
      </aside>

      <main class="col-12 col-md-9">
        <div class="p-4 bg-white border rounded shadow-sm">
          <h2 class="h5">Content</h2>
          <p class="text-muted">
            On mobile, the columns stack. On md and up, sidebar is 3 columns wide and content is 9.
          </p>
          <div class="row g-3">
            <div class="col-12 col-lg-6">
              <div class="p-3 border rounded">Main block A</div>
            </div>
            <div class="col-12 col-lg-6">
              <div class="p-3 border rounded">Main block B</div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
