<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bootstrap 5 - Exercise 7.2 Text transforms</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <h1 class="h3 mb-4">Exercise 7.2: <code>text-uppercase</code>, <code>text-lowercase</code>, <code>text-capitalize</code></h1>

    <div class="row g-3">
      <div class="col-12 col-md-4">
        <div class="p-4 bg-white border rounded shadow-sm">
          <div class="small text-muted mb-2">text-uppercase</div>
          <div class="text-uppercase fw-bold">Hello Bootstrap</div>
        </div>
      </div>

      <div class="col-12 col-md-4">
        <div class="p-4 bg-white border rounded shadow-sm">
          <div class="small text-muted mb-2">text-lowercase</div>
          <div class="text-lowercase fw-bold">Hello Bootstrap</div>
        </div>
      </div>

      <div class="col-12 col-md-4">
        <div class="p-4 bg-white border rounded shadow-sm">
          <div class="small text-muted mb-2">text-capitalize</div>
          <div class="text-capitalize fw-bold">hello bootstrap types</div>
        </div>
      </div>
    </div>

    <div class="alert alert-secondary mt-4 mb-0">
      Utility classes affect text casing only (not the underlying content).
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
