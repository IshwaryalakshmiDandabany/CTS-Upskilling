<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bootstrap 5 - Exercise 9.2 Button Groups and Toggle</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <h1 class="h3 mb-3">Exercise 9.2: Button groups + toggle buttons with checkboxes</h1>

    <div class="row g-3">
      <div class="col-12 col-lg-6">
        <div class="card shadow-sm">
          <div class="card-body">
            <h2 class="h5">Button group</h2>

            <div class="btn-group mt-3" role="group" aria-label="Basic button group">
              <button type="button" class="btn btn-outline-primary">Left</button>
              <button type="button" class="btn btn-outline-primary">Middle</button>
              <button type="button" class="btn btn-outline-primary">Right</button>
            </div>

            <div class="mt-4">
              <div class="btn-group-vertical" role="group" aria-label="Vertical button group">
                <button type="button" class="btn btn-secondary">Top</button>
                <button type="button" class="btn btn-secondary">Middle</button>
                <button type="button" class="btn btn-secondary">Bottom</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-6">
        <div class="card shadow-sm">
          <div class="card-body">
            <h2 class="h5">Toggle buttons with checkboxes</h2>
            <p class="text-muted small">Use button toggles via the checkbox inside a <code>.btn-group</code>.</p>

            <div class="btn-group mt-2" role="group" aria-label="Toggle buttons">
              <input type="checkbox" class="btn-check" id="btn-check-1" autocomplete="off" checked>
              <label class="btn btn-outline-success" for="btn-check-1">Option 1</label>

              <input type="checkbox" class="btn-check" id="btn-check-2" autocomplete="off">
              <label class="btn btn-outline-success" for="btn-check-2">Option 2</label>

              <input type="checkbox" class="btn-check" id="btn-check-3" autocomplete="off">
              <label class="btn btn-outline-success" for="btn-check-3">Option 3</label>
            </div>

            <div class="mt-4 alert alert-secondary mb-0 small">
              These toggles look/behave like buttons, controlled by checkboxes.
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
