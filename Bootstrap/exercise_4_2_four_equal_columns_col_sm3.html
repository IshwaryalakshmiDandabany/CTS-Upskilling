<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bootstrap 5 - Exercise 4.2</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <h1 class="h3 mb-3">Exercise 4.2: Create a four-column layout (col-sm-3) with equal width</h1>

    <div class="row g-3">
      <div class="col-12 col-sm-3">
        <div class="p-4 bg-white border rounded shadow-sm text-center">
          <strong>1</strong>
        </div>
      </div>
      <div class="col-12 col-sm-3">
        <div class="p-4 bg-white border rounded shadow-sm text-center">
          <strong>2</strong>
        </div>
      </div>
      <div class="col-12 col-sm-3">
        <div class="p-4 bg-white border rounded shadow-sm text-center">
          <strong>3</strong>
        </div>
      </div>
      <div class="col-12 col-sm-3">
        <div class="p-4 bg-white border rounded shadow-sm text-center">
          <strong>4</strong>
        </div>
      </div>
    </div>

    <div class="alert alert-secondary mt-4 mb-0">
      On mobile they stack (col-12). On small (sm) and above, each column becomes <code>1/4</code> using <code>col-sm-3</code>.
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
