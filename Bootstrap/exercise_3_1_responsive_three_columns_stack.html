<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bootstrap 5 - Exercise 3.1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <h1 class="h3 mb-3">Exercise 3.1: Responsive columns (stack on mobile, 2 per row on tablet, 3 on desktop)</h1>

    <div class="row g-3">
      <!-- Mobile (xs): stack vertically -->
      <!-- Tablet (md): 2 per row => col-md-6 -->
      <!-- Desktop (lg+): 3 per row => col-lg-4 -->

      <div class="col-12 col-md-6 col-lg-4">
        <div class="p-4 bg-white border rounded shadow-sm text-center">
          <h2 class="h5 mb-0">Column 1</h2>
        </div>
      </div>
      <div class="col-12 col-md-6 col-lg-4">
        <div class="p-4 bg-white border rounded shadow-sm text-center">
          <h2 class="h5 mb-0">Column 2</h2>
        </div>
      </div>
      <div class="col-12 col-md-6 col-lg-4">
        <div class="p-4 bg-white border rounded shadow-sm text-center">
          <h2 class="h5 mb-0">Column 3</h2>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
