<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bootstrap 5 - Exercise 1.2</title>

  <!--
    Exercise 1.2 (Downloaded Files approach):
    1) Download Bootstrap 5 files from getbootstrap.com
    2) Copy the "dist" folder structure into your project
    3) Update the href/src paths below to match your local files

    Expected local file locations (example):
    ./bootstrap-5.3.3-dist/css/bootstrap.min.css
    ./bootstrap-5.3.3-dist/js/bootstrap.bundle.min.js
  -->

  <link rel="stylesheet" href="./bootstrap-5.3.3-dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="p-4 bg-white border rounded shadow-sm">
      <h1 class="h3 mb-2">Exercise 1.2</h1>
      <p class="text-muted mb-3">
        Sample HTML wired to <code>bootstrap.min.css</code> and <code>bootstrap.bundle.min.js</code> from downloaded files.
      </p>

      <button class="btn btn-success">Local Bootstrap works</button>

      <hr class="my-4" />
      <div class="small text-muted">
        If you open this file without local Bootstrap files present, styles/scripts won’t load.
        Download Bootstrap and adjust the paths.
      </div>
    </div>
  </div>

  <script src="./bootstrap-5.3.3-dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
