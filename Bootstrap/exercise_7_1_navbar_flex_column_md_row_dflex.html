<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bootstrap 5 - Exercise 7.1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <h1 class="h3 mb-4">Exercise 7.1: Navbar with responsive flex behavior</h1>

    <nav class="navbar bg-white border rounded shadow-sm px-3 py-3">
      <!-- Responsive: column on mobile, row on md+ -->
      <div class="d-flex flex-column flex-md-row w-100 align-items-start align-items-md-center">
        <a class="navbar-brand" href="#">MyLogo</a>

        <div class="ms-0 ms-md-3 mt-3 mt-md-0 w-100 w-md-auto">
          <div class="d-flex flex-column flex-sm-row gap-2">
            <a class="nav-link px-0" href="#">Home</a>
            <a class="nav-link px-0" href="#">About</a>
            <a class="nav-link px-0" href="#">Services</a>
            <a class="nav-link px-0" href="#">Contact</a>
          </div>
        </div>

        <div class="ms-md-auto mt-3 mt-md-0">
          <button class="btn btn-primary btn-sm" type="button">Sign in</button>
        </div>
      </div>
    </nav>

    <div class="alert alert-secondary mt-4 mb-0">
      Resize screen: on mobile the nav items stack vertically (flex-column). On md+ they align in a row (flex-md-row).
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
