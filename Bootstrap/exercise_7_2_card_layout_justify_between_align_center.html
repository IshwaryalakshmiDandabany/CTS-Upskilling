<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bootstrap 5 - Exercise 7.2</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <h1 class="h3 mb-3">Exercise 7.2: Use <code>justify-content-between</code> and <code>align-items-center</code> in a card layout</h1>

    <div class="card shadow-sm">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <div class="h5 mb-0">Card Title</div>
            <div class="text-muted">Subtitle / status</div>
          </div>

          <div class="d-flex align-items-center gap-2">
            <span class="badge text-bg-primary">New</span>
            <button class="btn btn-outline-primary btn-sm" type="button">Action</button>
          </div>
        </div>

        <hr class="my-4" />

        <div class="d-flex justify-content-between align-items-center">
          <div class="text-muted">Left aligned block</div>
          <div class="fw-bold">Right aligned value</div>
        </div>
      </div>
    </div>

    <div class="alert alert-secondary mt-4 mb-0">
      Both rows use the same flex utilities to align items on the center axis and spread them out.
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
