<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bootstrap 5 - Exercise 8.1 Registration Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <h1 class="h3 mb-3">Exercise 8.1: Registration form (form-control, form-check, input-group)</h1>

    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="card shadow-sm">
          <div class="card-body">
            <form>
              <div class="mb-3">
                <label class="form-label">Full name</label>
                <input type="text" class="form-control" placeholder="John Doe" />
              </div>

              <div class="mb-3">
                <label class="form-label">Email</label>
                <div class="input-group">
                  <span class="input-group-text">@</span>
                  <input type="email" class="form-control" placeholder="john@example.com" />
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Create a password" />
              </div>

              <div class="mb-3">
                <label class="form-label d-block">Gender</label>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="gender" id="genderMale" checked />
                  <label class="form-check-label" for="genderMale">Male</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="gender" id="genderFemale" />
                  <label class="form-check-label" for="genderFemale">Female</label>
                </div>
              </div>

              <div class="mb-3">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="" id="terms" checked />
                  <label class="form-check-label" for="terms">
                    I agree to the Terms & Conditions
                  </label>
                </div>
              </div>

              <button class="btn btn-primary w-100" type="button">Create account</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div class="alert alert-secondary mt-4 mb-0">
      Includes: <code>form-control</code>, <code>form-check</code>, and an <code>input-group</code>.
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
