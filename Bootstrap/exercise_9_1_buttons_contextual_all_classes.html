<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bootstrap 5 - Exercise 9.1 Buttons</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <h1 class="h3 mb-3">Exercise 9.1: Buttons using contextual classes (btn-primary, btn-secondary, btn-outline-*, etc.)</h1>

    <div class="card shadow-sm">
      <div class="card-body">
        <div class="row g-3">
          <div class="col-12">
            <h2 class="h5">Solid</h2>
          </div>

          <div class="col-6 col-md-3"><button class="btn btn-primary w-100">Primary</button></div>
          <div class="col-6 col-md-3"><button class="btn btn-secondary w-100">Secondary</button></div>
          <div class="col-6 col-md-3"><button class="btn btn-success w-100">Success</button></div>
          <div class="col-6 col-md-3"><button class="btn btn-danger w-100">Danger</button></div>

          <div class="col-6 col-md-3"><button class="btn btn-warning w-100">Warning</button></div>
          <div class="col-6 col-md-3"><button class="btn btn-info w-100">Info</button></div>
          <div class="col-6 col-md-3"><button class="btn btn-light w-100">Light</button></div>
          <div class="col-6 col-md-3"><button class="btn btn-dark w-100">Dark</button></div>

          <div class="col-12">
            <hr class="my-3" />
            <h2 class="h5">Outline</h2>
          </div>

          <div class="col-6 col-md-3"><button class="btn btn-outline-primary w-100">Outline Primary</button></div>
          <div class="col-6 col-md-3"><button class="btn btn-outline-secondary w-100">Outline Secondary</button></div>
          <div class="col-6 col-md-3"><button class="btn btn-outline-success w-100">Outline Success</button></div>
          <div class="col-6 col-md-3"><button class="btn btn-outline-danger w-100">Outline Danger</button></div>

          <div class="col-6 col-md-3"><button class="btn btn-outline-warning w-100">Outline Warning</button></div>
          <div class="col-6 col-md-3"><button class="btn btn-outline-info w-100">Outline Info</button></div>
          <div class="col-6 col-md-3"><button class="btn btn-outline-light w-100">Outline Light</button></div>
          <div class="col-6 col-md-3"><button class="btn btn-outline-dark w-100">Outline Dark</button></div>

          <div class="col-12">
            <hr class="my-3" />
            <h2 class="h5">Other variations</h2>
            <div class="d-flex flex-wrap gap-2">
              <button class="btn btn-primary btn-lg">Large</button>
              <button class="btn btn-secondary btn-sm">Small</button>
              <button class="btn btn-primary" disabled>Disabled</button>
              <button class="btn btn-link">Link button</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="alert alert-secondary mt-4 mb-0">Resize window to see buttons wrap.</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
